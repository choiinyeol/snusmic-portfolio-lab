# Declarative branch-protection spec for `main`.
#
# Consumed by `probot/settings` (https://github.com/apps/settings) or
# `repository-settings-syncer`. To sync manually:
#   gh api -X PUT /repos/:owner/:repo/branches/main/protection \
#     --input .github/branch-protection-payload.json
# (Generate payload.json by converting this yaml — a helper script will land
#  alongside the settings bot when it is installed.)
#
# Required checks cover the Python/data CI lane plus the static Next.js web
# build. Deployment itself is intentionally not a required check because it
# depends on repository Vercel secrets and only runs on pushes to main.

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
      required_status_checks:
        strict: true
        contexts:
          - ci / lint
          - ci / type
          - ci / test
          - ci / schema-drift
          - ci / schema-compat
          - web / build
      enforce_admins: true
      required_linear_history: true
      allow_force_pushes: false
      allow_deletions: false
      required_conversation_resolution: true
      restrictions: null
