name: refresh-prices

# Daily price refresh — weekdays after KR market close (09:30 UTC = 18:30 KST)
# Rebuilds performance data, stock charts, and backtest from the price cache.
# No report collection; touches origin servers not at all.
on:
  schedule:
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

# Shared concurrency group prevents overlap with the weekly report workflow.
concurrency:
  group: verdict-archive-refresh
  cancel-in-progress: false

jobs:
  refresh-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: data/prices
          key: prices-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            prices-${{ runner.os }}-

      - name: Rebuild dataset, charts, backtest
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          python scripts/build_report_performance.py --sleep 0.3
          python scripts/export_stock_charts.py
          python scripts/backtest_momentum.py

      - name: Commit refreshed artifacts
        run: |
          git config user.name "verdict-archive-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/report-performance.json src/data/strategy-backtest.json public/prices data/report_performance.csv data/report_parsed.csv data/report_parse_issues.csv
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: daily price refresh ($(date -u +%F))"
          git push
