name: full-sweep-manual

# 수동 전용 전수 스윕 — 평소엔 일간 증분(refresh-daily)이 전부 커버하므로 스케줄 없음.
# 수집기 버그 복구나 과거 누락 의심 시에만 Actions 탭에서 수동 실행(--full로 전 페이지 순회).
# OCR fallback (ocr_fallback.py) is Windows-only and is skipped in CI.
on:
  workflow_dispatch:

permissions:
  contents: write

# Shared concurrency group prevents overlap with the daily incremental workflow.
concurrency:
  group: verdict-archive-refresh
  cancel-in-progress: false

jobs:
  refresh-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv python install 3.12

      - run: uv sync --frozen

      # Install Playwright browsers (needed for KUVIC and Voera collectors).
      - name: Install Playwright + browsers
        run: uv run python -m playwright install chromium --with-deps

      # JDK is available on ubuntu-latest via PATH (openjdk pre-installed).
      # transcribe_pdfs.py uses pdfminer/pdfplumber (pure Python); JDK is only
      # needed by opendataloader-pdf tools which this project does not use directly.

      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: data/prices
          key: prices-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            prices-${{ runner.os }}-

      # Full sweep: collectors walk all pages to catch any missed reports.
      - name: Collect all reports (full sweep)
        run: |
          uv run python scripts/collect_reports.py --source all --full
          uv run python scripts/collect_kuvic_browser.py
          uv run python scripts/collect_smic.py --full
          uv run python scripts/collect_ewha.py --full
          uv run python scripts/collect_voera.py --full

      # Transcription is incremental: already-transcribed .md files are skipped.
      # ocr_fallback.py (Windows winocr) is intentionally skipped in CI.
      - name: Transcribe only-new PDFs
        run: |
          uv run python scripts/transcribe_pdfs.py

      - name: Rebuild dataset, charts, backtest
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          uv run python scripts/build_report_performance.py --sleep 0.3
          uv run python scripts/export_stock_charts.py
          uv run python scripts/backtest_momentum.py
          uv run python scripts/export_signals_api.py

      - name: Commit refreshed artifacts
        run: |
          git config user.name "verdict-archive-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/report-performance.json src/data/strategy-backtest.json public/prices \
            public/api public/strategy-marks \
            data/report_performance.csv data/report_parsed.csv data/report_parse_issues.csv \
            data/sources/manifest.json data/markdown
          # data/pdfs는 gitignore — add하면 커밋 스텝이 죽는다 (refresh-daily와 동일)
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: weekly full sweep ($(date -u +%F))"
          git push
