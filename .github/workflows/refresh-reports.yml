name: refresh-reports

# Weekly report check — Monday early (01:00 UTC = 10:00 KST).
# Collectors run in incremental mode and no-op fast when nothing is new,
# keeping load on origin servers minimal (manifest-dedup already prevents re-fetch).
# OCR fallback (ocr_fallback.py) is Windows-only and is skipped in CI.
on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

# Shared concurrency group prevents overlap with the daily price workflow.
concurrency:
  group: verdict-archive-refresh
  cancel-in-progress: false

jobs:
  refresh-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: data/prices
          key: prices-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            prices-${{ runner.os }}-

      # Collectors are incremental: they check their manifests and skip
      # already-downloaded reports, so this is a fast no-op when nothing is new.
      - name: Collect new reports (incremental, no-op when nothing new)
        run: |
          python scripts/collect_reports.py --source all
          python scripts/collect_kuvic_browser.py
          python scripts/collect_smic.py --source all

      # Transcription is also incremental: already-transcribed .md files are skipped.
      # JDK is available on ubuntu-latest via PATH (openjdk pre-installed).
      # ocr_fallback.py (Windows winocr) is intentionally skipped in CI.
      - name: Transcribe only-new PDFs
        run: |
          python scripts/transcribe_pdfs.py

      - name: Rebuild dataset, charts, backtest
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          python scripts/build_report_performance.py --sleep 0.3
          python scripts/export_stock_charts.py
          python scripts/backtest_momentum.py

      - name: Commit refreshed artifacts
        run: |
          git config user.name "verdict-archive-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/report-performance.json src/data/strategy-backtest.json public/prices data/report_performance.csv data/report_parsed.csv data/report_parse_issues.csv
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: weekly report refresh ($(date -u +%F))"
          git push
