name: Refresh market data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: snusmic-data-${{ github.ref }}
  # Share the data-writer lane with sync.yml, but serialize instead of
  # cancelling. A push-triggered sync run can otherwise interrupt this workflow
  # while it is producing generated data, losing the scheduled refresh.
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Refresh yfinance metrics
        run: |
          uv run --locked python -m snusmic_pipeline build-warehouse
          uv run --locked python -m snusmic_pipeline refresh-prices
          scripts/refresh_web_artifacts.sh

      - name: Commit market data updates
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/warehouse data/sim data/web apps/web/public/downloads
          if git diff --cached --quiet; then
            echo "No market data changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Refresh market data"
          # Phase 4 — rebase + retry loop. Mirrors sync.yml; concurrent
          # workflows can race on the same branch and produce non-fast-
          # forward errors that resolve on a fresh ``git pull --rebase``.
          pushed=false
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF#refs/heads/}" || true
            if git push origin "HEAD:${GITHUB_REF#refs/heads/}"; then
              pushed=true
              break
            fi
            echo "price-refresh: push attempt $attempt failed; retrying."
            sleep $((attempt * 5))
          done
          if [ "$pushed" != "true" ]; then
            echo "::error::price-refresh failed to push after 3 attempts."
            exit 1
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch web deployment
        # GITHUB_TOKEN-authored pushes do not trigger other workflows, so
        # explicitly ask web.yml to redeploy whenever this job actually
        # committed fresh data.
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run web.yml --ref "${GITHUB_REF#refs/heads/}"
