name: web

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "data/web/**"
      - "data/sim/**"
      - "data/warehouse/**"
      - "scripts/refresh_web_artifacts.sh"
      - ".github/workflows/web.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "data/web/**"
      - "data/sim/**"
      - "data/warehouse/**"
      - "scripts/refresh_web_artifacts.sh"
      - ".github/workflows/web.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Refresh web data artifacts
        run: scripts/refresh_web_artifacts.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Install web dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Lint web app
        working-directory: apps/web
        run: pnpm lint

      - name: Type-check web app
        working-directory: apps/web
        run: pnpm typecheck

      - name: Build static web app
        working-directory: apps/web
        run: pnpm build
