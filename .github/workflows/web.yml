name: web

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "data/web/**"
      - "data/sim/**"
      - "data/warehouse/**"
      - "scripts/refresh_web_artifacts.sh"
      - "scripts/prepare_vercel_prebuilt.sh"
      - "package.json"
      - "vercel.json"
      - "scripts/vercel_build.sh"
      - ".github/workflows/web.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "data/web/**"
      - "data/sim/**"
      - "data/warehouse/**"
      - "scripts/refresh_web_artifacts.sh"
      - "scripts/prepare_vercel_prebuilt.sh"
      - "package.json"
      - "vercel.json"
      - "scripts/vercel_build.sh"
      - ".github/workflows/web.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Refresh web data artifacts
        run: scripts/refresh_web_artifacts.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Install web dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Lint web app
        working-directory: apps/web
        run: pnpm lint

      - name: Type-check web app
        working-directory: apps/web
        run: pnpm typecheck

      - name: Build static web app
        working-directory: apps/web
        run: pnpm build

      - name: Prepare Vercel prebuilt output
        run: scripts/prepare_vercel_prebuilt.sh

      - name: Install Vercel CLI
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: npm install --global vercel@latest

      - name: Link Vercel project for prebuilt deploy
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

      - name: Deploy prebuilt static app to Vercel production
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel deploy --prebuilt --prod --archive=tgz --yes --token "$VERCEL_TOKEN"

      - name: Explain skipped Vercel deployment
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '')
        run: |
          echo "Skipped Vercel deploy because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is missing."
          echo "Set the GitHub repository secrets before relying on CI/CD deployment."
