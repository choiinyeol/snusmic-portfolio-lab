name: web

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "data/web/**"
      - "data/sim/**"
      - "data/warehouse/**"
      - "scripts/prepare_vercel_prebuilt.mjs"
      - "package.json"
      - "vercel.json"
      - "scripts/vercel_build.mjs"
      - ".github/workflows/web.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "data/web/**"
      - "data/sim/**"
      - "data/warehouse/**"
      - "scripts/prepare_vercel_prebuilt.mjs"
      - "package.json"
      - "vercel.json"
      - "scripts/vercel_build.mjs"
      - ".github/workflows/web.yml"
  workflow_dispatch:
    inputs:
      refresh_artifacts:
        description: "Rebuild Python sim/web artifacts before the Next.js deploy"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.refresh_artifacts == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.refresh_artifacts == 'true'
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python dependencies
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.refresh_artifacts == 'true'
        run: uv sync --locked --group dev

      - name: Refresh web data artifacts
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.refresh_artifacts == 'true'
        run: uv run --locked python -m snusmic_pipeline refresh-web-artifacts

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "apps/web/pnpm-lock.yaml"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate

      - name: Install web dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Validate committed web artifacts
        working-directory: apps/web
        run: pnpm artifact:check

      - name: Format check (Biome)
        working-directory: apps/web
        run: pnpm format:check

      - name: Lint web app (Biome)
        working-directory: apps/web
        run: pnpm lint

      - name: Type-check web app
        working-directory: apps/web
        run: pnpm typecheck

      - name: Build static web app
        working-directory: apps/web
        run: pnpm build

      - name: Smoke exported routes
        working-directory: apps/web
        run: pnpm smoke:static

      - name: Prepare Vercel prebuilt output
        run: node scripts/prepare_vercel_prebuilt.mjs

      - name: Install Vercel CLI
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: npm install --global vercel@54.3.0

      - name: Link Vercel project for prebuilt deploy
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

      - name: Deploy prebuilt static app to Vercel production
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: vercel deploy --prebuilt --prod --archive=tgz --yes --token "$VERCEL_TOKEN"

      - name: Explain skipped Vercel deployment
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '')
        run: |
          echo "::error::Cannot deploy because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is missing."
          exit 1
