name: Sync SNUSMIC reports

on:
  workflow_dispatch:
    inputs:
      report_pages:
        description: "SNUSMIC research page range to sync"
        required: false
        default: "1-7"
      enable_hybrid_ocr:
        description: "Start OpenDataLoader hybrid OCR backend"
        required: false
        default: "false"
      force_full:
        description: "Run even when no new report is detected"
        required: false
        default: "false"
  schedule:
    - cron: "30 23 * * *"

permissions:
  contents: write

concurrency:
  group: snusmic-data-${{ github.ref }}
  # Data-refresh workflows push generated files back to main. Do not cancel an
  # in-flight writer when another push/scheduled refresh arrives; queue it so
  # the commit/rebase retry loop below can finish without dropping a refresh.
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_sync: ${{ steps.decide.outputs.should_sync }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect new page-one reports
        id: detect
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          PYTHONPATH=src python - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          from snusmic_pipeline.change_detection import new_report_urls
          urls = new_report_urls(Path("data/manifest.json"))
          print(f"has_new={'true' if urls else 'false'}")
          print("new_urls<<EOF")
          for url in urls:
              print(url)
          print("EOF")
          PY

      - name: Decide work
        id: decide
        run: |
          if [ "${{ github.event.inputs.force_full || 'false' }}" = "true" ]; then
            echo "should_sync=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.detect.outputs.has_new }}" = "true" ]; then
            echo "should_sync=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "No new reports; no sync needed."
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
          else
            echo "No new reports on page one; skipping heavy sync."
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
          fi

  sync:
    needs: check
    if: needs.check.outputs.should_sync == 'true'
    runs-on: ubuntu-latest
    env:
      REPORT_PAGES: ${{ github.event.inputs.report_pages || '1-7' }}
      ENABLE_HYBRID_OCR: ${{ github.event.inputs.enable_hybrid_ocr || 'false' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --group dev --extra ocr

      - name: Run tests
        run: uv run pytest

      - name: Start OpenDataLoader hybrid OCR backend
        if: env.ENABLE_HYBRID_OCR == 'true'
        run: |
          uv run opendataloader-pdf-hybrid --port 5002 --force-ocr --ocr-lang "ko,en" --device cpu > /tmp/opendataloader-hybrid.log 2>&1 &
          for i in {1..60}; do
            python -c 'import socket; s=socket.socket(); s.settimeout(1); s.connect(("127.0.0.1", 5002)); s.close()' && exit 0 || true
            sleep 2
          done
          echo "OpenDataLoader hybrid backend did not open port 5002"
          cat /tmp/opendataloader-hybrid.log
          exit 1

      - name: Sync reports
        run: |
          if [ "$ENABLE_HYBRID_OCR" = "true" ]; then
            uv run python -m snusmic_pipeline sync --pages "$REPORT_PAGES" --opendataloader-hybrid docling-fast
          else
            uv run python -m snusmic_pipeline sync --pages "$REPORT_PAGES"
          fi

      - name: Build simulation data artifacts
        run: |
          uv run python -m snusmic_pipeline build-warehouse
          uv run python -m snusmic_pipeline refresh-prices
          scripts/refresh_web_artifacts.sh

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/manifest.json data/extracted_reports.csv data/pdfs data/markdown data/warehouse data/sim data/web apps/web/public/downloads
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Refresh SNUSMIC report data"
            # Phase 4 — rebase + retry loop (plan README §27.3 fix). Concurrent
            # workflows (for example price-refresh) may push between our last
            # fetch and the push, producing a non-fast-forward. Retry up to
            # 3 times with exponential-ish backoff before giving up.
            pushed=false
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF#refs/heads/}" || true
              if git push origin "HEAD:${GITHUB_REF#refs/heads/}"; then
                pushed=true
                break
              fi
              echo "sync: push attempt $attempt failed; retrying."
              sleep $((attempt * 5))
            done
            if [ "$pushed" != "true" ]; then
              echo "::error::sync data refresh failed to push after 3 attempts."
              exit 1
            fi
          fi
