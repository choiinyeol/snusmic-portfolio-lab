name: refresh-data

# 매주 월요일 09:30 KST (00:30 UTC) — 시세 갱신 → 데이터셋·차트·백테스트 재생성 → 커밋
# 푸시되면 Vercel이 자동으로 재배포한다.
on:
  schedule:
    - cron: "30 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Rebuild dataset (price cache is not committed — full refetch)
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          python scripts/build_report_performance.py --sleep 0.3
          python scripts/export_stock_charts.py
          python scripts/backtest_momentum.py

      - name: Commit refreshed artifacts
        run: |
          git config user.name "verdict-archive-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/report-performance.json src/data/strategy-backtest.json public/prices data/report_performance.csv data/report_parsed.csv data/report_parse_issues.csv
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: weekly data refresh ($(date -u +%F))"
          git push
