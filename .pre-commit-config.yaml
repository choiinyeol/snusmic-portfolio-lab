exclude: ^(\.omx/|data/|apps/web/(?:\.next|out|public|node_modules)/)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: "^(apps/|site/|data/)"
      - id: end-of-file-fixer
        exclude: "^(apps/|site/|data/)"
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: check-json
        exclude: "^(apps/web/tsconfig.json|apps/web/biome.json)$"

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        files: ^(src|tests|scripts)/
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        files: ^(src|tests|scripts)/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.1
    hooks:
      - id: mypy
        files: ^src/snusmic_pipeline/sim/
        additional_dependencies:
          - pydantic>=2.6
          - pandas-stubs
          - types-requests

  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.14
    hooks:
      - id: biome-check
        files: ^apps/web/.*\.(ts|tsx|js|jsx|mjs|cjs|json)$
        exclude: ^apps/web/(\.next|out|public|node_modules)/
        additional_dependencies: ["@biomejs/biome@2.4.14"]
